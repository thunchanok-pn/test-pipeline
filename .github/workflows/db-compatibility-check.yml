name: DB Compatibility Testing (PostgreSQL 16-Alpine)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compatibility-test:
    name: Test App Compatibility
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workflow_user
          POSTGRES_PASSWORD: workflow_password
          POSTGRES_DB: app_compatibility_db
        options: >-
          --health-cmd "pg_isready -U workflow_user -d app_compatibility_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      # Step 1: Fetch repository source code
      - name: Checkout Application Code
        uses: actions/checkout@v4

      # Step 2: Install native database toolbelt to initialize schema
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      # Step 3: Populate the exact schema structure server.js looks for
      - name: Initialize Database Schema
        env:
          PGPASSWORD: workflow_password
        run: |
          echo "Seeding compatibility tables..."
          psql -h localhost -U workflow_user -d app_compatibility_db -c "
            CREATE TABLE IF NOT EXISTS app_users (
              id SERIAL PRIMARY KEY,
              username VARCHAR(255) NOT NULL,
              password VARCHAR(255) NOT NULL,
              active BOOLEAN DEFAULT true
            );
            INSERT INTO app_users (username, password, active) VALUES ('test_admin', 'secure_password', true);
          "

      # Step 4: Provision Node environment using dependencies matching your workspace
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 5: Install runtime workspace requirements
      - name: Install Dependencies
        run: npm install

      # Step 6: Trigger tests against the active PostgreSQL 16 instance
      - name: Run Integration Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: app_compatibility_db
          POSTGRES_USER: workflow_user
          POSTGRES_PASSWORD: workflow_password
        run: npm test
